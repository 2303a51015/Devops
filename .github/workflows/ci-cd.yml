name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install backend
        run: |
          cd backend
          npm install

      - name: Install frontend
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build || echo "no build script"

      - name: Run backend
        run: |
          cd backend
          node server.js &
          sleep 5
          curl http://localhost:3000 || echo "server check skipped"